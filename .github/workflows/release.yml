name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create, for example v1.0.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
            git fetch --tags origin "$TAG"
            git checkout "$TAG"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if ! [[ "$TAG" =~ ^v[0-9]+(\.[0-9]+){1,2}([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tags must look like v1.0.0, v1.0, or v1.0.0-beta.1" >&2
            exit 1
          fi

          if ! git branch -r --contains HEAD | grep -q 'origin/main'; then
            echo "Release tag must point to a commit contained in origin/main." >&2
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Show Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Build release binaries
        run: swift build -c release --arch arm64

      - name: Bundle app, CLI, and driver
        run: ./bundle.sh --with-driver

      - name: Prepare release assets
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          mkdir -p release-assets
          ditto -c -k --keepParent NoNoiseMac.app "release-assets/NoNoiseMac-${TAG}.app.zip"
          ditto -c -k --keepParent NoNoiseMacCLI "release-assets/NoNoiseMacCLI-${TAG}.zip"
          ditto -c -k --keepParent NoNoiseMic.driver "release-assets/NoNoiseMic-driver-${TAG}.zip"
          shasum -a 256 release-assets/* > "release-assets/SHA256SUMS-${TAG}.txt"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          gh release create "$TAG" release-assets/* \
            --title "NoNoise Mac $TAG" \
            --notes "Apple Silicon build of NoNoise Mac. First launch may require right-click → Open because the app is ad-hoc signed."
